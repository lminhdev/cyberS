<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSecurity - Data Breach Scanner</title>
    <style>
        :root {
            --primary-cyan: #00f2fe;
            --bg-dark: #0a0f19;
            --panel-bg: rgba(18, 26, 43, 0.7);
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
            --danger: #ff4757;
            --success: #2ed573;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 242, 254, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 242, 254, 0.05), transparent 25%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Glassmorphism Container */
        .cyber-container {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .header h2 {
            color: var(--primary-cyan);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* Input Group */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .input-group input {
            background: rgba(10, 15, 25, 0.6);
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 8px;
            padding: 15px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--primary-cyan);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .cyber-btn {
            background: linear-gradient(45deg, transparent 5%, var(--primary-cyan) 5%);
            background-color: #0088ff; /* Fallback */
            color: #000;
            border: none;
            padding: 15px;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            border-radius: 4px;
        }

        .cyber-btn:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        /* Result Box Base */
        .result-box {
            display: none;
            border-radius: 8px;
            margin-top: 20px;
            overflow: hidden;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        /* Hiệu ứng Radar Scanner Custom */
        .radar-scanner {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            margin: 0 auto 15px auto;
            background: 
                linear-gradient(90deg, transparent 49%, rgba(0, 242, 254, 0.2) 50%, transparent 51%),
                linear-gradient(180deg, transparent 49%, rgba(0, 242, 254, 0.2) 50%, transparent 51%),
                rgba(10, 15, 25, 0.6);
            border: 1px solid rgba(0, 242, 254, 0.3);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.1), inset 0 0 10px rgba(0, 242, 254, 0.1);
        }

        .radar-scanner::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150%; 
            height: 150%;
            background: conic-gradient(from 0deg, transparent 70%, rgba(0, 242, 254, 0.8) 100%);
            transform-origin: 0 0;
            animation: radar-spin 1.2s linear infinite;
        }

        @keyframes radar-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Kết quả Styling */
        .status-safe {
            background: rgba(46, 213, 115, 0.1) !important;
            border-color: var(--success) !important;
            padding: 20px;
            color: var(--success);
        }
        .status-danger {
            background: rgba(255, 71, 87, 0.1) !important;
            border-color: var(--danger) !important;
            padding: 20px;
            color: var(--danger);
        }
        .leak-list {
            margin-top: 15px;
            text-align: left;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 5px;
        }
        .leak-item {
            color: #fff;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 8px 0;
        }
        .leak-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

    <div class="cyber-container">
        <div class="header">
            <h2>Data Breach Scanner</h2>
            <p>Kiểm tra dấu vết email trên Darkweb & Data Dumps</p>
        </div>

        <div class="input-group">
            <input type="email" id="emailInput" placeholder="Nhập địa chỉ email của bạn..." required>
            <button class="cyber-btn" onclick="checkEmailLeak()">Kiểm Tra Ngay</button>
        </div>

        <div id="resultBox" class="result-box"></div>
    </div>

    <script>
        async function checkEmailLeak() {
            const email = document.getElementById('emailInput').value.trim();
            const resultBox = document.getElementById('resultBox');

            if (!email) {
                alert('Hệ thống yêu cầu nhập địa chỉ email hợp lệ!');
                return;
            }

            // Giao diện Loading tích hợp Radar CSS
            resultBox.style.display = 'block';
            resultBox.className = 'result-box';
            resultBox.style.background = 'rgba(18, 26, 43, 0.9)';
            resultBox.innerHTML = `
                <div style="text-align: center; padding: 2rem;">
                    <div class="radar-scanner"></div> 
                    <p style="font-weight: 600;">Đang truy quét cơ sở dữ liệu rò rỉ toàn cầu...</p>
                    <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 5px;">Xin chờ, đang quét qua Pastebin & Darkweb...</p>
                </div>
            `;

            // Giả lập delay gọi API (2.5 giây) để user kịp xem hiệu ứng loading quét radar
            setTimeout(() => {
                // LOGIC TEST: Để thử tính năng, mình thiết lập nếu email có chữ "admin" hoặc "test" thì trả về giao diện Đỏ.
                // *GHI CHÚ: Sau này bạn thay đoạn logic này bằng code fetch API thật của bạn.*
                const isLeaked = email.toLowerCase().includes('admin') || email.toLowerCase().includes('test');
                
                if (isLeaked) {
                    // Trạng thái BỊ RÒ RỈ (Màu Đỏ)
                    resultBox.className = 'result-box status-danger';
                    resultBox.innerHTML = `
                        <h3 style="margin-bottom: 10px;">⚠️ CẢNH BÁO RÒ RỈ!</h3>
                        <p style="font-size: 0.95rem;">Email <strong>${email}</strong> đã bị phát hiện trong các đợt rò rỉ dữ liệu sau:</p>
                        <div class="leak-list">
                            <div class="leak-item">💀 <strong>Canva (2019)</strong> - Lộ email, mật khẩu mã hóa, tên.</div>
                            <div class="leak-item">💀 <strong>Facebook (2021)</strong> - Lộ số điện thoại, email, ID.</div>
                        </div>
                        <p style="font-size: 0.85rem; margin-top: 15px; color: #ffcccc;">Khuyến nghị khẩn cấp: Thay đổi mật khẩu ngay lập tức và bật 2FA.</p>
                    `;
                } else {
                    // Trạng thái AN TOÀN (Màu Xanh)
                    resultBox.className = 'result-box status-safe';
                    resultBox.innerHTML = `
                        <h3 style="margin-bottom: 10px;">✅ TÌNH TRẠNG AN TOÀN</h3>
                        <p style="font-size: 0.95rem;">Tuyệt vời! Không tìm thấy dấu vết của <strong>${email}</strong> trong bất kỳ cơ sở dữ liệu rò rỉ nào.</p>
                        <p style="font-size: 0.85rem; margin-top: 15px; color: #ccffcc;">Mức độ bảo mật tốt. Hãy tiếp tục duy trì nhé!</p>
                    `;
                }
            }, 2500); // Thời gian chờ 2.5s
        }
    </script>
</body>
</html>
